name: build caddy
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Caddy version to build (git ref)"
        required: false
        type: string
      custom_core:
        description: "Caddy custom core (e.g. github.com/user/caddy/v2@branch)"
        required: false
        type: string
      tag_latest:
        description: "Tag build as latest?"
        default: false
        required: false
        type: boolean
  push:
    branches:
      - master
    paths:
      - "Dockerfile"
      - "version.txt"

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  build:
    name: "Build Caddy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine build args
        id: build_args
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(cat version.txt)"
          fi

          if [ -n "${{ github.event.inputs.custom_core }}" ]; then
            CUSTOM_CORE="${{ github.event.inputs.custom_core }}"
          else
            CUSTOM_CORE=""
          fi

          BASE="ghcr.io/${GITHUB_REPOSITORY_OWNER@L}/caddy"
          TAGS="$BASE:$VERSION"
          if [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event.inputs.tag_latest }}" == "true" ]; then
            TAGS="$TAGS,$BASE:latest"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "CUSTOM_CORE=$CUSTOM_CORE" >> $GITHUB_OUTPUT
          echo "TAGS=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.build_args.outputs.TAGS }}
          build-args: |
            SELECTED_VERSION=${{ steps.build_args.outputs.VERSION }}
            CUSTOM_CORE=${{ steps.build_args.outputs.CUSTOM_CORE }}
          push: true
